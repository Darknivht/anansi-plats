[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests
markers =
    slow: Mark test as slow-running.
    integration: Integration test that requires external services.
    unit: Fast unit test (default).
    auth: Authentication-related tests.
    brain: Second Brain tests.
    agents: Agent Workshop tests.
    whatsapp: WhatsApp channel tests.
    marketplace: Marketplace tests.
    billing: Billing tests.
    notifications: Notification tests.
    users: User profile tests.
    integrations: Integration connector tests.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
addopts = -v --strict-markers
log_cli = true
log_cli_level = INFO
