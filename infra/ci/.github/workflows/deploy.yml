# ──────────────────────────────────────────────────────────────
# Anansi Platform — CI/CD Pipeline
# GitHub Actions → Docker Build → Railway Deploy
# ──────────────────────────────────────────────────────────────

name: Deploy Anansi

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_WEB: ${{ github.repository }}/web
  DOCKER_IMAGE_API: ${{ github.repository }}/api
  DOCKER_IMAGE_WORKER: ${{ github.repository }}/worker

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Test ───
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: anansi_test
          POSTGRES_USER: anansi
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U anansi -d anansi_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Frontend Checks ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit -p services/frontend/tsconfig.json

      - name: Lint Frontend
        run: npm run lint

      - name: Run Frontend Tests
        run: npm run test
        env:
          CI: true

      # ── Backend Checks ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Backend Dependencies
        run: |
          pip install --upgrade pip
          pip install -r services/backend/requirements.txt
          pip install -r services/worker/requirements.txt

      - name: Lint Python
        run: |
          pip install ruff
          ruff check services/backend/ services/worker/

      - name: Run Backend Tests
        run: |
          cd services/backend
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v
        env:
          DATABASE_URL: postgresql+asyncpg://anansi:test_pass@localhost:5432/anansi_test
          DATABASE_URL_SYNC: postgresql://anansi:test_pass@localhost:5432/anansi_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          JWT_SECRET: test-jwt-secret
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: services/backend/coverage.xml
          flags: backend

  # ─── Build & Push Docker Images ───
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_WEB }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_API }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_WORKER }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build API Image ──
      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_API }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build Web Image ──
      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_WEB }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build Worker Image ──
      - name: Build & Push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_WORKER }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Railway ───
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API Service
        run: railway up --service api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Web Service
        run: railway up --service web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Worker Service
        run: railway up --service worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Database Migrations
        run: railway run --service api alembic upgrade head
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Notify ───
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [lint-and-test, deploy]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Notify Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Anansi deployed successfully to production — ${{ github.sha }}"
            }

      - name: Notify Failure
        if: ${{ needs.deploy.result == 'failure' || needs.lint-and-test.result == 'failure' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Anansi deployment failed — ${{ github.sha }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
